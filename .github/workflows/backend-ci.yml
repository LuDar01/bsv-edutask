name: Backend Unit Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Vi lägger till python-dotenv här för att fixa "dotenv"-felet
        pip install pytest pytest-mongodb pymongo flask flask-cors pytest-cov python-dotenv
        if [ -f requirements.pip ]; then pip install -r requirements.pip; fi

    - name: Run unit tests
      run: |
        cd backend
        python -m pytest test/test_usercontroller.py test/test_integration_dao.py